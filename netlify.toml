# Netlify config — MUST live at the repo root. Netlify reads this first, then
# builds inside the `site/` subfolder where the Astro project lives.
[build]
  base = "site"
  command = "npm run build"
  publish = "dist"          # relative to base -> site/dist

[build.environment]
  NODE_VERSION = "22"

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── 301 redirect map ──────────────────────────────────────────────
# Non-www → www and http → https are handled by Netlify's primary-domain
# setting (set www.allspeechesgreatandsmall.com as primary, force HTTPS).
#
# Add a line here for every OLD ranking URL whose slug differs from the new
# one (verify against Search Console → Pages before launch). Examples:
#
# [[redirects]]
#   from = "/old-groom-service-url"
#   to   = "/groom-speech-writer"
#   status = 301
