# Netlify config — MUST live at the repo root. Netlify reads this first, then
# builds inside the `site/` subfolder where the Astro project lives.
[build]
  base = "site"
  command = "npm run build"
  publish = "dist"          # relative to base -> site/dist
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── 301 redirect map (from GSC Coverage export, 10 Jun 2026) ───────
# Host-level: set www.allspeechesgreatandsmall.com as the PRIMARY domain and
# enable "Force HTTPS" in Netlify — that covers http→https and non-www→www.
# The old bestman.* subdomain must be pointed at this site in DNS, then:
[[redirects]]
  from = "https://bestman.allspeechesgreatandsmall.com/*"
  to = "https://www.allspeechesgreatandsmall.com/best-man-speech-writer/"
  status = 301
  force = true

