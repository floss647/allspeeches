# Netlify deploy config for the Astro static site.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── 301 redirect map ──────────────────────────────────────────────
# Non-www → www and http → https are handled by Netlify's primary-domain
# setting (set www.allspeechesgreatandsmall.com as primary, force HTTPS).
#
# Add a line here for every OLD ranking URL whose slug differs from the new
# one (verify against Search Console → Pages before launch). Examples:
#
# /old-groom-service-url      /groom-speech-writer            301!
# /old-fotb-service-url       /father-of-the-bride-speech-writer  301!
# /old-eulogy-service-url     /eulogy-writing-service         301!
# /old-groom-guide-url        /groom-speeches                 301!
# /old-fotb-guide-url         /father-of-the-bride-speeches   301!
# /old-eulogy-guide-url       /eulogy-examples                301!
